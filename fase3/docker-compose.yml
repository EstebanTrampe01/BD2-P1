version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: mundiales_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mundiales_user
      MONGO_INITDB_ROOT_PASSWORD: mundiales1234
      MONGO_INITDB_DATABASE: mundiales
    volumes:
      - mongo_data:/data/db
      - ./scripts/init_indexes.js:/docker-entrypoint-initdb.d/init_indexes.js:ro
    command: ["mongod", "--auth"]

  mongo-express:
    image: mongo-express:latest
    container_name: mundiales_mongo_ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: mundiales_user
      ME_CONFIG_MONGODB_ADMINPASSWORD: mundiales1234
      ME_CONFIG_MONGODB_URL: mongodb://mundiales_user:mundiales1234@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb

volumes:
  mongo_data:
